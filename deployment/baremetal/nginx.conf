# SAJHA MCP Server — Nginx Reverse Proxy
# Copyright All rights Reserved 2025-2030, Ashutosh Sinha
#
# Install: sudo cp nginx.conf /etc/nginx/sites-available/sajha
#          sudo ln -s /etc/nginx/sites-available/sajha /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream sajha_backend {
    server 127.0.0.1:3002;
    keepalive 32;
}

server {
    listen 80;
    server_name sajha.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sajha.yourdomain.com;

    # SSL (use certbot for Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/sajha.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sajha.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request limits
    client_max_body_size 50M;

    # MCP endpoints
    location / {
        proxy_pass http://sajha_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE (long-lived connections)
    location /mcp/sse {
        proxy_pass http://sajha_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WebSocket
    location /mcp/ws {
        proxy_pass http://sajha_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Static files (optional: serve directly)
    location /static/ {
        alias /opt/sajha/sajha/web/static/;
        expires 7d;
        access_log off;
    }
}
