# Copyright All rights Reserved 2025-2030, Ashutosh Sinha
#
# Features:
#   - Environment variable substitution:  ${VAR:default_value}
#   - Override any key via env var:        SAJHA_DB_HOST=prod-db.internal
#   - Nested keys flatten to dot notation: db.host, server.port, etc.
#   - Supports .env file for local development
# ============================================================================

app:
  name: SAJHA MCP Server
  version: 5.3.0
  description: Model Context Protocol Server
  author: Ashutosh Sinha
  email: ajsinha@gmail.com
  copyright_years: "2025-2030"
  github:
    repo: https://github.com/ajsinha/sajhamcpserver
    repo_name: ajsinha/sajhamcpserver

server:
  host: ${SERVER_HOST:0.0.0.0}
  port: ${SERVER_PORT:3002}
  debug: false

# ── Database ─────────────────────────────────────────────────────────────────
# SAJHA uses SQL scripts only — no migrations, no Alembic, no ORM auto-create.
# Scripts are dialect-specific; the engine runs db/scripts/<db.type>/ in sorted order:
#   db/scripts/sqlite/      001_schema.sql + 002_seed.sql   (db.type: sqlite)
#   db/scripts/postgresql/  001_schema.sql + 002_seed.sql   (db.type: postgresql)
# Both are idempotent (CREATE TABLE IF NOT EXISTS / INSERT ... safe to re-run).
#
# Default: SQLite (zero config, single file, good for dev/small production).
# For production: uncomment the PostgreSQL block below and comment out SQLite.

db:
  # ── SQLite (default — works out of the box) ──
  type: sqlite
  path: data/sajha.db

  # ── PostgreSQL (uncomment for production) ──
  # type: postgresql
  # host: ${DB_HOST:localhost}
  # port: ${DB_PORT:5432}
  # name: ${DB_NAME:sajha}
  # user: ${DB_USER:sajha}
  # password: ${DB_PASSWORD:change-me-in-production}
  # driver: psycopg2                      # psycopg2 (sync) | asyncpg (async)
  # ssl: false                            # Set true for cloud-hosted PostgreSQL
  #
  # ── PostgreSQL on AWS RDS ──
  # type: postgresql
  # host: ${SAJHA_DB_HOST:sajha-db.xxxx.us-east-1.rds.amazonaws.com}
  # port: ${SAJHA_DB_PORT:5432}
  # name: ${SAJHA_DB_NAME:sajha}
  # user: ${SAJHA_DB_USER:sajha}
  # password: ${SAJHA_DB_PASSWORD:}       # Set via env var or Secrets Manager
  # driver: psycopg2
  # ssl: true
  #
  # ── PostgreSQL on Hetzner Managed DB ──
  # type: postgresql
  # host: ${DB_HOST:your-db.hetzner.cloud}
  # port: ${DB_PORT:5432}
  # name: ${DB_NAME:sajha}
  # user: ${DB_USER:sajha}
  # password: ${DB_PASSWORD:}
  # driver: psycopg2
  # ssl: true

  pool:
    size: ${DB_POOL_SIZE:10}
  echo: false                             # Log all SQL statements (debug only)
  scripts_dir: db/scripts                 # Location of 001_schema.sql + 002_seed.sql

# ── Authentication ───────────────────────────────────────────────────────────

auth:
  jwt:
    secret: ${JWT_SECRET:sajha-jwt-secret-change-in-production}
    algorithm: HS256
    expiry_minutes: ${JWT_EXPIRY:60}
  session:
    secret_key: ${SESSION_SECRET:sajha-session-secret-change-in-production}
    timeout_minutes: 60

# ── OAuth (optional) ────────────────────────────────────────────────────────

oauth:
  mode: none                            # none | internal | external | hybrid
  provider: ""                          # azure | okta | auth0 | keycloak
  azure:
    tenant_id: ${AZURE_TENANT_ID:}
    client_id: ${AZURE_CLIENT_ID:}
    client_secret: ${AZURE_CLIENT_SECRET:}

# ── Config Paths ─────────────────────────────────────────────────────────────

config:
  tools:
    dir: config/tools
  prompts:
    dir: config/prompts
  plugins:
    dir: config/plugins
  users:
    path: config/users.json
  apikeys:
    path: config/apikeys.json
  ir:
    dir: config/ir

# ── Hot Reload ───────────────────────────────────────────────────────────────

hot_reload:
  enabled: true
  interval_seconds: 300

# ── Features ─────────────────────────────────────────────────────────────────

features:
  websocket:
    enabled: true
  monitoring:
    enabled: true
  admin:
    panel:
      enabled: true

# ── Logging ──────────────────────────────────────────────────────────────────

logging:
  level: ${LOG_LEVEL:INFO}
  dir: ./logs                              # Log directory (created if missing)
  file: ""                                 # Log file name (empty = stdout only, e.g. "sajha.log")

# ── Data Directories ────────────────────────────────────────────────────────

data:
  dir: ./data                              # Base data directory
  duckdb:
    dir: ./data/duckdb
  sqlselect:
    dir: ./data/sqlselect

# ── Storage backend (filesystem abstraction: local on-prem, S3 on AWS) ───────
# Routes read/write IO through sajha.core.storage. 'local' is a no-op wrapper
# over the filesystem (works for laptop disk, EBS, or an EFS mount — EFS is just
# a path, not a separate backend). 's3' reads/writes an object-storage bucket
# with a local read-through cache. Mutable state (the SQLite DB, audit log,
# cache) is NOT an S3 candidate — keep it on a real filesystem (EFS) or a
# managed service (RDS). See docs/STORAGE_ROADMAP.md.
storage:
  backend: local                           # local | s3 | azure | gcs  (env: SAJHA_STORAGE_BACKEND)
  base_dir: "."                            # base dir for the local backend
  s3:
    bucket: ""                            # env: SAJHA_S3_BUCKET
    prefix: "sajha/"                       # key prefix within the bucket
    region: us-east-1                        # env: AWS_DEFAULT_REGION
    endpoint_url: ""                         # optional: MinIO / Cloudflare R2 / Wasabi
    cache_dir: /tmp/sajha-cache              # local mirror for importlib / real-file needs
    sync_interval: 60                        # S3SyncManager poll seconds (hot-reload equivalent)
  azure:                                     # backend: azure  (azure-storage-blob)
    container: ""                         # env: SAJHA_AZURE_CONTAINER
    account_url: ""                        # https://<acct>.blob.core.windows.net — uses managed identity (env: SAJHA_AZURE_ACCOUNT_URL)
    connection_string: ""                  # alternative auth (env: AZURE_STORAGE_CONNECTION_STRING) — keep secrets in env, not here
    prefix: "sajha/"
    cache_dir: /tmp/sajha-cache
  gcs:                                       # backend: gcs  (google-cloud-storage)
    bucket: ""                            # env: SAJHA_GCS_BUCKET
    project: ""                           # env: GOOGLE_CLOUD_PROJECT — uses Application Default Credentials / workload identity
    prefix: "sajha/"
    cache_dir: /tmp/sajha-cache

# ── External API Keys ───────────────────────────────────────────────────────

fmp:
  api:
    key: ${FMP_API_KEY:}

google:
  api:
    key: ${GOOGLE_API_KEY:}
  search:
    engine:
      id: ${GOOGLE_SEARCH_ENGINE_ID:}

fred:
  api:
    key: ${FRED_API_KEY:}

tavily:
  api:
    key: ${TAVILY_API_KEY:}

# ── AI Integration ───────────────────────────────────────────
# LLM providers, semantic discovery, and gateway configuration.
# Each provider is enabled by setting its API key (or for keyless
# providers like Bedrock/Ollama, they register automatically).
ai:
  default_provider: ${AI_DEFAULT_PROVIDER:anthropic}
  default_model: ${AI_DEFAULT_MODEL:claude-sonnet-4-20250514}
  embedding_provider: ${AI_EMBEDDING_PROVIDER:openai}
  embedding_model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
  # Semantic tool search — natural-language query → top-k matching tools.
  tool_search:
    enabled: true
    embedder: ${AI_TOOL_SEARCH_EMBEDDER:bm25}   # bm25 (lexical, default, no deps) | gateway (API embeddings)
    persist: true                                # persist the vector index (gateway mode) via storage
    top_k: 5
  cache:
    enabled: true
    ttl_seconds: 3600
  anthropic:
    api_key: ${ANTHROPIC_API_KEY:}
  openai:
    api_key: ${OPENAI_API_KEY:}
  bedrock:
    region: ${AWS_DEFAULT_REGION:us-east-1}
  together:
    api_key: ${TOGETHER_API_KEY:}
  ollama:
    base_url: ${OLLAMA_BASE_URL:http://localhost:11434}
  azure_openai:
    api_key: ${AZURE_OPENAI_API_KEY:}
    endpoint: ${AZURE_OPENAI_ENDPOINT:}

# ── Tool Output Cache ────────────────────────────────────────────────────────
# File-based cache for tool results. Each entry is a JSON file on disk.
# Default: disabled per tool. Tools opt in via "cache_ttl" in their JSON config.

cache:
  enabled: ${CACHE_ENABLED:true}          # Master switch — false disables all caching
  dir: ${CACHE_DIR:data/cache}            # Directory for cache files
  max_files: ${CACHE_MAX_FILES:50000}     # Maximum number of cache files before eviction
  max_file_size_kb: ${CACHE_MAX_FILE_KB:512}  # Skip caching results larger than this (KB)
  cleanup_interval_seconds: 300           # How often to purge expired files (0 = disabled)
  # Per-tool TTL is set in each tool's JSON config: "cache_ttl": 3600
  # Setting cache_ttl: 0 or omitting it means no caching for that tool.

# ── Async Tool Execution ─────────────────────────────────────────────────────
# Background execution with result delivery via webhook, Kafka, or filesystem.
# Client gets task_id immediately; result delivered when ready.

async:
  enabled: ${ASYNC_ENABLED:true}
  workers: ${ASYNC_WORKERS:8}             # Daemon threads in worker pool
  queue_size: ${ASYNC_QUEUE_SIZE:1000}    # Max pending tasks (503 on overflow)
  task_ttl_hours: ${ASYNC_TASK_TTL:24}    # Retain completed tasks for N hours
  delivery:
    webhook:
      timeout: 10
      max_retries: 3
    kafka:
      bootstrap_servers: ${KAFKA_BROKERS:localhost:9092}
    file:
      base_dir: ${ASYNC_FILE_DIR:data/async_results}
      max_size_mb: 50

# ── Shell Execution (DISABLED BY DEFAULT) ────────────────────────────────────
# Sandboxed Python and Bash execution for AI agents.
# SECURITY: Disabled by default. Enable only in trusted environments.

shell:
  enabled: ${SHELL_ENABLED:false}           # Master switch — DISABLED by default
  mode: sandbox                              # sandbox | unrestricted (admin-only)
  scratch_dir: data/shell_scratch            # Working directory for scripts
  python:
    enabled: true                            # Python sandbox (when shell.enabled=true)
    timeout_seconds: 30                      # Max execution time
    memory_limit_mb: 256                     # Max memory per execution
    # Allowed imports: json, math, csv, statistics, re, datetime, collections,
    #   itertools, functools, decimal, pandas, numpy
    # Blocked: os, sys, subprocess, socket, http, requests, ctypes, pickle
  bash:
    enabled: false                           # Bash sandbox — extra opt-in required
    timeout_seconds: 15
    max_output_bytes: 1048576                # 1 MB output cap
    # Allowed commands: cat, grep, awk, sed, sort, uniq, wc, jq, head, tail,
    #   ls, find, echo, date, base64, md5sum
    # Blocked: rm, chmod, sudo, ssh, wget, python, docker, pipe-to-shell
